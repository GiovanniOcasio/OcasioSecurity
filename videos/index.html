<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos - Ocasio Security</title>
  <link rel="icon" type="image/png" href="../imgs/ocasio_background.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: #149414;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      text-align: center;
      flex-direction: column;
      min-height: 100vh;
    }

    #title {
      width: 100%;
      font-size: 28px;
      font-weight: bold;
      margin-top: 20px;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background-color: black;
      color: #149414;
      padding: 10px 0;
      z-index: 10;
    }

    #nav {
      position: fixed;
      top: 60px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      background-color: black;
      border-bottom: 2px solid #149414;
      z-index: 10;
      flex-wrap: wrap; /* Added for mobile wrapping */
    }

    #nav a {
      padding: 15px 20px;
      color: #149414;
      text-decoration: none;
      text-align: center;
      font-size: 20px;
      transition: background-color 0.3s ease;
      background-color: black;
      border-radius: 5px;
      margin: 5px; /* Adjusted for wrapping space */
    }

    #nav a:hover {
      background-color: #0f7f0f;
    }

    .social-button.github {
      background-color: #333;
      color: white;
    }

    .social-button.github:hover {
      background-color: #555;
    }

    .social-button.linkedin {
      background-color: #0077b5;
      color: white;
    }

    .social-button.linkedin:hover {
      background-color: #005983;
    }

    #video-grid {
      display: flex;
      flex-wrap: wrap; /* Added */
      justify-content: center;
      gap: 20px;
      padding: 120px 20px 20px; /* Added top padding for fixed header/nav */
      width: 100%;
    }

    .video-container {
      position: relative;
      width: 30%;
      height: 400px;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 1024px) {
      .video-container {
        width: 45%;
        height: 300px;
      }
    }

    @media (max-width: 768px) {
      #title {
        font-size: 24px;
      }

      #nav {
        position: relative;
        top: 0;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding-top: 10px;
      }

      #nav a {
        font-size: 16px;
        padding: 10px;
      }

      #video-grid {
        flex-direction: column;
        align-items: center;
        padding: 20px 10px;
      }

      .video-container {
        width: 90%;
        height: 250px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="title">Video Library</div>

    <a href="../">Home</a>
    <a href="../whoami">whoami</a>

    <a href="https://github.com/GiovanniOcasio/GiovanniOcasio" class="social-button github" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/giovanni-ocasio-3369b1198/" class="social-button linkedin" target="_blank">LinkedIn</a>
  </div>
